project_id = "medvision"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "10MiB"

[auth]
enabled = true
site_url = "http://localhost"
additional_redirect_urls = ["medvision://auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true

[edge_runtime]
enabled = true
policy = "oneshot"
